<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>广州天气预报</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #f4f7f9;
      color: #1f2933;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 32px;
      font-weight: 700;
    }

    .temperature {
      font-size: 56px;
      line-height: 1;
      font-weight: 700;
      color: #0f766e;
      margin: 0 0 16px;
    }

    dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 12px 18px;
      margin: 24px 0;
    }

    dt {
      color: #52606d;
    }

    dd {
      margin: 0;
      font-weight: 600;
    }

    .tip {
      margin-top: 20px;
      padding: 16px;
      background: #eef8f6;
      border-left: 4px solid #0f766e;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <h1>广州天气预报</h1>
    <p class="temperature">25.3°C</p>
    <dl>
      <dt>城市</dt>
      <dd>广州</dd>
      <dt>天气</dt>
      <dd>阴</dd>
      <dt>湿度</dt>
      <dd>97%</dd>
      <dt>风力</dt>
      <dd>7.4 km/h</dd>
      <dt>更新时间</dt>
      <dd>2026-06-18T03:15</dd>
      <dt>数据来源</dt>
      <dd>Open-Meteo API</dd>
    </dl>
    <p class="tip">天气变化要留意，出门前再看一眼最新预报。</p>
  </main>
</body>
</html>
