name: Deploy weather site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      AMAP_KEY: ${{ secrets.AMAP_KEY }}
      AMAP_BROWSER_KEY: ${{ secrets.AMAP_BROWSER_KEY }}
      DEFAULT_ADCODE: ${{ vars.DEFAULT_ADCODE || '440100' }}
      DEFAULT_CITY: ${{ vars.DEFAULT_CITY || '广州' }}
      SITE_NAME: ${{ vars.SITE_NAME || '天气预报' }}
      WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Update weather data
        run: npm run update

      - name: Check generated site
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload public folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send WeCom notification
        env:
          SITE_URL: ${{ vars.SITE_URL || steps.deployment.outputs.page_url }}
        run: npm run notify
